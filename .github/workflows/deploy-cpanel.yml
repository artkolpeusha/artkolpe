name: Deploy static site to cPanel

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - sanity_publish
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_SANITY_API_VERSION: ${{ vars.NEXT_PUBLIC_SANITY_API_VERSION }}
      SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Validate deploy configuration
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ vars.NEXT_PUBLIC_SANITY_API_VERSION }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          CPANEL_SSH_USERNAME: ${{ secrets.CPANEL_SSH_USERNAME }}
          CPANEL_SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          CPANEL_DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH }}
        run: |
          missing=0

          for name in NEXT_PUBLIC_SITE_URL NEXT_PUBLIC_SANITY_PROJECT_ID NEXT_PUBLIC_SANITY_DATASET NEXT_PUBLIC_SANITY_API_VERSION SANITY_API_TOKEN CPANEL_SSH_HOST CPANEL_SSH_PORT CPANEL_SSH_USERNAME CPANEL_SSH_PRIVATE_KEY CPANEL_DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure SSH key
        env:
          CPANEL_SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh

          if printf '%s' "$CPANEL_SSH_PRIVATE_KEY" | grep -q '\\n'; then
            printf '%b' "$CPANEL_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          else
            printf '%s\n' "$CPANEL_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          fi

          chmod 600 ~/.ssh/deploy_key

          if ! grep -Eq '^-----BEGIN (OPENSSH|RSA|EC) PRIVATE KEY-----$' ~/.ssh/deploy_key; then
            echo "::error::CPANEL_SSH_PRIVATE_KEY is not a valid PEM/OpenSSH private key format."
            exit 1
          fi

          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          ssh-keyscan -T 10 -p "$CPANEL_SSH_PORT" "$CPANEL_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy out directory to cPanel
        env:
          CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          CPANEL_SSH_USERNAME: ${{ secrets.CPANEL_SSH_USERNAME }}
          CPANEL_DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH }}
        run: |
          rsync -avz --delete --omit-dir-times --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -p $CPANEL_SSH_PORT" \
            out/ "$CPANEL_SSH_USERNAME@$CPANEL_SSH_HOST:$CPANEL_DEPLOY_PATH/"
